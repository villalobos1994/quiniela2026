participantes.forEach(p=>{

function mezclar(arreglo){

return arreglo.sort(()=>Math.random()-0.5);

}

function mostrar(){

let tabla=[];

participantes.forEach(p=>{

let total=0;

tarjetas[p].forEach(e=>{

}

});

nombre:p,

puntos:total

});

});

(a,b)=>b.puntos-a.puntos

);

html+="<h2>📊 Tabla General</h2>";

t.nombre+

" - "+

t.puntos+

" pts</p>";

}

);

}

});

).innerHTML=html;

let html="";

).innerHTML=html;

function sortear(){

if(bombo>6){

alert(
"🏆 El sorteo ya terminó."
);

return;

}

let lista=
mezclar([...equipos[bombo]]);

let i=0;

function siguiente(){

if(i<8){

tarjetas[
participantes[i]
].push(
lista[i]
);

mostrar();

i++;

setTimeout(
siguiente,
1000
);

}else{

bombo++;

if(bombo<=6){

document.getElementById(
"bomboActual"
).innerHTML=bombo;

}else{

document.getElementById(
"bomboActual"
).innerHTML=
"FINALIZADO 🏆";

}

}

}

siguiente();

}
